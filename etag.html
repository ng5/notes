<!DOCTYPE html>
<html ng-app="myApp" lang="en-US" >
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.6/angular.min.js"></script>
<script src="/angular-http-etag.min.js"></script>

<script>
	angular
	.module('myApp', [
		'http-etag'
		])
	.config(function (httpEtagProvider) {

		httpEtagProvider
		.defineCache('persistentCache', {
			cacheService: 'localStorage'
		})
		.defineCache('sessionCache', {
			cacheService: 'sessionStorage'
		})
		.defineCache('memoryCache', {
			cacheService: '$cacheFactory'
		});
		console.log("httpEtagProvider setup complete");
	})
	.controller('MyCtrl', function ($http) {
		var self = this

		$http
		.get('/monthlySales.json', {
			etagCache: 'sessionCache'
		})
		.then(function success (response, itemCache) {
			console.log("server response:"+response.data);
			itemCache.set(response.data);
		}, function error (response) {
			if (response.status != 304) alert('Request error')
		})
		.ifCached(function (response, itemCache) {
			console.log("cached response:"+response.data);
		});
	});
</script>
<div ng-controller="MyCtrl">

</div>
</html>
